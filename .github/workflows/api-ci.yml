name: API CI

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect api changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_SHA="${{ github.event.before }}"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]] || ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
              echo "api=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            BASE_SHA=$(git merge-base HEAD origin/main)
          fi

          if git diff --name-only "$BASE_SHA" "${{ github.sha }}" | grep -qE '^(api/|\.github/workflows/api-ci\.yml$)'; then
            echo "api=true" >> "$GITHUB_OUTPUT"
          else
            echo "api=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm i
      - name: Run linter
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm i
      - name: Build
        run: npm run build

  unit-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm i
      - name: Run unit tests
        run: npm run test:unit

  e2e-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "123123"
          POSTGRES_DB: hairo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_NAME: hairo
      NODE_ENV: test
      PORT: "3001"
      LOG_LEVEL: warn
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_LOGIN: postgres
      DB_PASSWORD: "123123"
      DB_NAME: hairo_test
      DB_ENABLE_LOGGING: "false"
      RECIPIENT: ""
      TELEGRAM_BOT_TOKEN: ""
      JWT_SECRET: ci-secret
      JWT_EXPIRES_IN: 1h
      STORAGE_ACCESS_KEY_ID: ci
      STORAGE_SECRET_ACCESS_KEY: ci
      STORAGE_BUCKET: hairo-ci
      IMAGE_MODEL: gemini-2.5-flash-image
      LLM_MODEL: gemini-2.5-flash
      GOOGLE_AI_API_KEY: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm i
      - name: Run e2e tests
        run: npm run test:e2e
