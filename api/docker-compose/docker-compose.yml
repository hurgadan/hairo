name: hairo

services:
  postgres:
    image: postgres:16-alpine
    container_name: hairo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123123"
      POSTGRES_DB: hairo
    ports:
      - "5432:5432"
    volumes:
      - hairo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hairo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hairo-pgdata:
