name: hairo

services:
  postgres:
    image: postgres:16-alpine
    container_name: hairo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123123"
      POSTGRES_DB: hairo
    ports:
      - "5432:5432"
    volumes:
      - hairo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hairo"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: hairo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hairo
      MINIO_ROOT_PASSWORD: hairo_dev_secret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web-консоль (http://localhost:9001)
    volumes:
      - hairo-miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hairo-pgdata:
  hairo-miniodata:
